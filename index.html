<!DOCTYPE html>
<html>
<head>
  <title>Moveora AI</title>
</head>
<body style="font-family:sans-serif; padding:40px">

  <h1>🌍 Moveora AI</h1>

  <input id="input" placeholder="cheap warm remote city" style="width:300px; padding:10px"/>
  <button onclick="getData()">Get Recommendations</button>

  <div id="results" style="margin-top:30px"></div>

  <script>
    async function getData() {
      const input = document.getElementById("input").value;

      const res = await fetch("/api/planner", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: input })
      });

      const data = await res.json();

      const container = document.getElementById("results");

      container.innerHTML = "";

      data.cities.forEach(city => {
        const div = document.createElement("div");
        div.innerHTML = `
          <h3>${city.city} (Score: ${city.score})</h3>
        `;
        container.appendChild(div);
      });

      const ai = document.createElement("p");
      ai.innerText = data.reply;
      container.appendChild(ai);
    }
  </script>

</body>
</html>
